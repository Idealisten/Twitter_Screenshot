<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XShot Render</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      body {
        width: 980px;
        overflow: hidden;
      }

      .is-hidden,
      #tweetUrl,
      #generateBtn,
      #downloadBtn,
      #message,
      #staticPreview {
        display: none;
      }

      canvas {
        display: block;
        width: 980px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <input id="tweetUrl" />
    <button id="generateBtn" type="button"></button>
    <button id="downloadBtn" type="button"></button>
    <div id="message"></div>
    <img id="staticPreview" alt="" />
    <canvas id="cardCanvas" width="980" height="900"></canvas>
    <script src="/static/app.js"></script>
    <script>
      window.__xshotRenderStatus = "idle";
      window.__xshotRenderError = "";

      async function renderFromQuery() {
        try {
          window.__xshotRenderStatus = "loading";
          if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
          }
          const params = new URLSearchParams(window.location.search);
          const url = params.get("url") || "";
          if (!url) throw new Error("missing url");
          const tweet = await fetchTweet(url);
          await renderCard(tweet);
          window.__xshotRenderStatus = "ready";
        } catch (error) {
          window.__xshotRenderError = error && error.message ? error.message : String(error);
          window.__xshotRenderStatus = "error";
        }
      }

      renderFromQuery();
    </script>
  </body>
</html>
