  <text x="335" y="297" class="muted body" font-size="28">@konstructivizm · Mar 18</text>

  <text x="86" y="365" class="ink quoteBody">Astronomers have discovered eleven new moons of Saturn.</text>
  <text x="86" y="423" class="ink quoteBody">Most of them are small rocky bodies up to 5 kilometers in</text>
  <text x="86" y="459" class="ink quoteBody">diameter. They move in retrograde orbits, meaning they</text>
  <text x="86" y="495" class="ink quoteBody">rotate in the opposite direction to Saturn's rotation around its</text>
  <text x="86" y="531" class="ink quoteBody">axis.</text>
  <text x="86" y="589" class="ink quoteBody">Until recently, Jupiter was considered the leader in the number</text>
  <text x="86" y="625" class="ink quoteBody">of moons. However, in recent years, Saturn has significantly</text>
  <text x="86" y="661" class="ink quoteBody">surged ahead. This same event may have helped form Saturn's</text>
  <text x="86" y="697" class="ink quoteBody">famous rings.</text>

